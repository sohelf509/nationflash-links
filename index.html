<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <!-- These tags generate the WhatsApp/Telegram preview -->
  <meta property="og:site_name" content="Nation Flash" />
  <meta property="og:type" content="article" />

  <!-- These get filled dynamically via JS from URL params -->
  <meta id="og-title" property="og:title" content="Nation Flash" />
  <meta id="og-description" property="og:description" content="" />
  <meta id="og-image" property="og:image" content="" />
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    // Try opening app
    if (id) {
      window.location = `nationflash://article/${id}`;
    }

    // Fallback to Play Store after 2s
    setTimeout(() => {
      window.location = "https://play.google.com/store/apps/details?id=com.hisabone.app";
    }, 2000);
  </script>
  <p>Opening Nation Flash...</p>
</body>
</html>
